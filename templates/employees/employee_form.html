{% extends "employees/base.html" %}

{% block title %}{{ title }} | CR Cyber Crime Foundation{% endblock %}

{% block content %}
<section class="form-shell">
    <div class="section-kicker">Employee Registry</div>
    <h1>{{ title }}</h1>
    <form method="post" enctype="multipart/form-data" class="employee-form">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label class="{% if field.name == 'company_address' %}span-2{% endif %}">
                {{ field.label }}
                {{ field }}
                {{ field.errors }}
            </label>
        {% endfor %}
        <div class="form-actions span-2">
            <a class="ghost-button" href="{% url 'dashboard' %}">Cancel</a>
            <button class="primary-button" type="submit">Save Employee</button>
        </div>
    </form>
</section>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const rows = document.querySelectorAll("table tbody tr");

        rows.forEach(row => {

            const cells = row.querySelectorAll("td");

            if (cells.length >= 4) {

                const employee = {
                    employee_id: cells[0].innerText.trim(),
                    full_name: cells[1].innerText.trim(),
                    designation: cells[2].innerText.trim(),
                    status: cells[3].innerText.trim()
                };

                localStorage.setItem(
                    "employee_" + employee.employee_id,
                    JSON.stringify(employee)
                );

            }

        });

        console.log("Employees saved in localStorage");

    });
</script>
{% endblock %}
